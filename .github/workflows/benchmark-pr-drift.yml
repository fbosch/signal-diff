name: Benchmark PR Drift

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  benchmark-drift:
    name: Benchmark Drift Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25.2.1
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Run benchmark profile
        run: |
          mkdir -p benchmarks/artifacts
          pnpm tsx benchmarks/run.ts --json > benchmarks/artifacts/current-benchmark-results.json

      - name: Compare against baseline
        id: compare
        run: |
          pnpm tsx benchmarks/compare.ts \
            --baseline=benchmarks/baselines/benchmark-baseline.v1.json \
            --current=benchmarks/artifacts/current-benchmark-results.json \
            --summary=benchmarks/artifacts/benchmark-drift-summary.md \
            --output=benchmarks/artifacts/benchmark-drift-summary.json \
            --warn-threshold=${{ vars.BENCHMARK_WARN_THRESHOLD_PERCENT || '10' }} \
            --fail-threshold=${{ vars.BENCHMARK_FAIL_THRESHOLD_PERCENT || '25' }}

      - name: Publish benchmark summary
        if: always()
        run: |
          if [ ! -f benchmarks/artifacts/benchmark-drift-summary.md ]; then
            echo "::warning::benchmark-drift-summary.md not found; compare step likely failed earlier."
            exit 0
          fi
          cat benchmarks/artifacts/benchmark-drift-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Emit drift status signal
        if: always()
        run: |
          if [ ! -f benchmarks/artifacts/benchmark-drift-summary.json ]; then
            echo "::warning::benchmark-drift-summary.json not found; skipping drift status emission."
            exit 0
          fi
          status=$(node -e "const fs=require('node:fs'); const report=JSON.parse(fs.readFileSync('benchmarks/artifacts/benchmark-drift-summary.json','utf8')); process.stdout.write(report.overall_status)")
          echo "Benchmark drift status: ${status}"
          if [ "$status" = "warn" ]; then
            echo "::warning::Benchmark drift status is WARN. Inspect benchmark summary for details."
          fi
          if [ "$status" = "fail" ]; then
            echo "::error::Benchmark drift status is FAIL."
            exit 1
          fi

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-pr-drift
          path: benchmarks/artifacts/*
          if-no-files-found: ignore
