name: Benchmark Trend Collection

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  benchmark-trend:
    name: Benchmark Trend (master)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Run benchmark trend profile
        run: |
          mkdir -p benchmarks/artifacts
          pnpm tsx benchmarks/run.ts --json > benchmarks/artifacts/benchmark-trend-results.json

      - name: Download recent trend history artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          BENCHMARK_TREND_WINDOW: ${{ vars.BENCHMARK_TREND_WINDOW || '5' }}
        run: |
          mkdir -p benchmarks/artifacts/trend-history
          target_history_count=$((BENCHMARK_TREND_WINDOW - 1))
          if [ "$target_history_count" -le 0 ]; then
            echo "Skipping history download because BENCHMARK_TREND_WINDOW=$BENCHMARK_TREND_WINDOW"
            exit 0
          fi
          mapfile -t run_ids < <(gh api "repos/${{ github.repository }}/actions/workflows/benchmark-trend.yml/runs" -f branch=master -f status=success -f per_page=30 --jq '.workflow_runs[] | .id')
          downloaded=0
          for run_id in "${run_ids[@]}"; do
            if [ "$downloaded" -ge "$target_history_count" ]; then
              break
            fi
            if [ "$run_id" = "${{ github.run_id }}" ]; then
              continue
            fi
            output_dir="benchmarks/artifacts/trend-history/$run_id"
            if gh run download "$run_id" -n benchmark-trend-master -D "$output_dir"; then
              downloaded=$((downloaded + 1))
              continue
            fi
            rm -rf "$output_dir"
          done
          echo "Downloaded $downloaded historical benchmark trend artifacts"

      - name: Render benchmark trend summary
        env:
          BENCHMARK_TREND_WINDOW: ${{ vars.BENCHMARK_TREND_WINDOW || '5' }}
        run: |
          pnpm tsx benchmarks/trend.ts \
            --current=benchmarks/artifacts/benchmark-trend-results.json \
            --history-dir=benchmarks/artifacts/trend-history \
            --window=${BENCHMARK_TREND_WINDOW} \
            --summary=benchmarks/artifacts/benchmark-trend-summary.md \
            --output=benchmarks/artifacts/benchmark-trend-summary.json

      - name: Publish benchmark trend summary
        if: always()
        run: |
          if [ ! -f benchmarks/artifacts/benchmark-trend-summary.md ]; then
            echo "::warning::benchmark-trend-summary.md not found; benchmark run likely failed earlier."
            exit 0
          fi
          cat benchmarks/artifacts/benchmark-trend-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Emit trend window completeness warning
        if: always()
        run: |
          if [ ! -f benchmarks/artifacts/benchmark-trend-summary.json ]; then
            echo "::warning::benchmark-trend-summary.json not found; skipping trend-window warning."
            exit 0
          fi
          missing=$(node -e "const fs=require('node:fs'); const summary=JSON.parse(fs.readFileSync('benchmarks/artifacts/benchmark-trend-summary.json','utf8')); process.stdout.write(String(summary.missing_runs));")
          if [ "$missing" -gt 0 ]; then
            echo "::warning::Benchmark trend summary missing $missing run(s) from configured window."
          fi

      - name: Emit trend guardrail signal
        if: always()
        run: |
          if [ ! -f benchmarks/artifacts/benchmark-trend-summary.json ]; then
            echo "::warning::benchmark-trend-summary.json not found; skipping guardrail signal."
            exit 0
          fi
          status=$(node -e "const fs=require('node:fs'); const summary=JSON.parse(fs.readFileSync('benchmarks/artifacts/benchmark-trend-summary.json','utf8')); process.stdout.write(String(summary.guardrail_status || 'warn'));")
          echo "Trend guardrail status: ${status}"
          if [ "$status" = "warn" ]; then
            echo "::warning::Benchmark trend guardrail is WARN. Trend may include runtime variance."
          fi
          if [ "$status" = "fail" ]; then
            echo "::error::Benchmark trend guardrail is FAIL due to control mismatch across trend window."
            exit 1
          fi

      - name: Upload trend artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-trend-master
          path: benchmarks/artifacts/*
          if-no-files-found: ignore
          retention-days: 30

      - name: Emit explicit failure signal
        if: failure()
        run: |
          echo "::error::Benchmark trend collection failed. Inspect step logs and artifacts for details."
          exit 1
