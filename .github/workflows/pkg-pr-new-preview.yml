name: pkg.pr.new Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - master

permissions:
  contents: read
  pull-requests: write

jobs:
  preview-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm build

      - name: Preview publication policy
        run: |
          printf '%s\n' 'pkg.pr.new preview publication is intentionally gated.'
          printf '%s\n' 'Enable it only after the public CLI package name, bin entry, and install contract are approved.'
